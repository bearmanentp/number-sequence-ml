<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AI 수열 규칙 예측기</title>
    <!-- TensorFlow.js 라이브러리 로드 -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; line-height: 1.6; }
        .block { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input[type="text"] { width: 100%; padding: 8px; box-sizing: border-box; font-size: 16px; }
        button { padding: 10px 20px; font-size: 16px; background-color: #007bff; color: white; border: none; cursor: pointer; border-radius: 4px; }
        button:disabled { background-color: #ccc; }
        #output { margin-top: 20px; padding: 15px; background: #f4f4f4; border-left: 5px solid #007bff; white-space: pre-line; }
    </style>
</head>
<body>

    <h2>🧠 AI 수열 규칙 예측기 (TensorFlow.js)</h2>
    <p>등차수열이나 등비수열 형태의 숫자들을 쉼표(,)로 구분해서 입력해 보세요. AI가 규칙을 학습합니다.</p>

    <div class="block">
        <label for="sequenceInput">수열 입력 (예: 4, 7, 10, 13, 16):</label>
        <input type="text" id="sequenceInput" value="4, 7, 10, 13, 16">
    </div>

    <div class="block">
        <label for="predictInput">몇 번째 항을 예측할까요? (기본값은 다음 항):</label>
        <input type="text" id="predictInput" placeholder="공백으로 두면 수열의 다음 항을 예측합니다">
    </div>

    <button id="trainBtn" onclick="runAI()">🤖 규칙 학습 및 예측하기</button>

    <div id="output">여기에 결과가 표시됩니다.</div>

    <script>
        async function runAI() {
            const outputDiv = document.getElementById('output');
            const trainBtn = document.getElementById('trainBtn');
            
            // 1. 입력 데이터 파싱
            const inputStr = document.getElementById('sequenceInput').value;
            const yData = inputStr.split(',').map(num => parseFloat(num.trim())).filter(num => !isNaN(num));
            
            if (yData.length < 2) {
                outputDiv.innerText = "⚠️ 숫자를 최소 2개 이상 입력해 주세요.";
                return;
            }

            // x 데이터 생성 (1, 2, 3, 4, 5...)
            const xData = [];
            for (let i = 1; i <= yData.length; i++) {
                xData.push(i);
            }

            // 예측 타겟 항 설정 (비어있으면 입력된 수열 바로 다음 항)
            let targetX = parseFloat(document.getElementById('predictInput').value);
            if (isNaN(targetX)) {
                targetX = yData.length + 1;
            }

            // UI 업데이트
            trainBtn.disabled = true;
            outputDiv.innerText = "🔄 AI 모델 구성 중...";

            // 2. TensorFlow.js 모델 생성 (뉴런 1개짜리 단순 선형 회귀)
            const model = tf.sequential();
            model.add(tf.layers.dense({ units: 1, inputShape: [1] }));

            // 컴파일 (최적화 함수 및 손실 함수 설정)
            model.compile({ optimizer: 'sgd', loss: 'meanSquaredError' });

            // 데이터를 텐서(Tensor) 형태로 변환
            const xs = tf.tensor2d(xData, [xData.length, 1]);
            const ys = tf.tensor2d(yData, [yData.length, 1]);

            outputDiv.innerText = "🏋️ AI가 수열의 규칙을 학습하는 중입니다 (500회 반복)...";

            // 3. 모델 학습 (500 에포크 수행)
            await model.fit(xs, ys, { epochs: 500 });

            outputDiv.innerText = "🔮 학습 완료! 결과를 예측하는 중...";

            // 4. 예측 수행
            const prediction = model.predict(tf.tensor2d([targetX], [1, 1]));
            // 텐서 내부의 실제 숫자 값 추출
            const resultValue = (await prediction.data())[0];

            // 5. 결과 출력
            outputDiv.innerText = `✅ 학습이 완료되었습니다!\n\n` + 
                                  `📊 입력된 수열: ${yData.join(', ')}\n` +
                                  `🎯 예측 목표: [${targetX}번째 항]\n` +
                                  `🤖 AI 예측값: ${resultValue.toFixed(2)}`;

            // 메모리 해제 (웹브라우저 성능 유지를 위해 필수)
            xs.dispose();
            ys.dispose();
            prediction.dispose();
            model.dispose();
            
            trainBtn.disabled = false;
        }
    </script>
</body>
</html>
