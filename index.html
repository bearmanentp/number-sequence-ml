<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 범용 수열 규칙 분석기 (MLP 딥러닝)</title>
    <!-- TensorFlow.js 라이브러리 탑재 -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #38bdf8;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
        }
        *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 30px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }
        h2 { margin-top: 0; font-size: 24px; color: var(--accent-color); }
        p.desc { color: var(--text-muted); font-size: 14px; margin-bottom: 25px; line-height: 1.5; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 8px; color: var(--text-muted); }
        input[type="text"], input[type="number"] {
            width: 100%; padding: 12px; background-color: #0f172a;
            border: 1px solid var(--border-color); border-radius: 8px;
            color: var(--text-main); font-size: 16px;
        }
        input:focus { outline: none; border-color: var(--accent-color); }
        
        .btn-group { display: flex; gap: 10px; }
        button {
            flex: 1; padding: 14px; font-size: 16px; font-weight: bold;
            border: none; border-radius: 8px; cursor: pointer; transition: opacity 0.2s;
        }
        #trainBtn { background-color: var(--accent-color); color: #0f172a; }
        #predictBtn { background-color: #10b981; color: white; }
        button:disabled { background-color: #475569; color: #94a3b8; cursor: not-allowed; }
        
        .status { margin-top: 20px; text-align: center; font-size: 14px; color: var(--accent-color); min-height: 20px; }
        .result-box {
            margin-top: 25px; padding: 20px; background-color: #0f172a;
            border-radius: 8px; border-left: 4px solid var(--accent-color); display: none;
        }
        .result-title { font-size: 16px; font-weight: bold; margin-bottom: 15px; }
        .result-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #1e293b; font-size: 14px; }
        .result-item:last-child { border-bottom: none; }
        .result-label { color: var(--text-muted); }
        .result-value { font-weight: 600; }
        .highlight { color: #34d399; font-size: 18px; }
        .presets { display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }
        .preset-btn { padding: 6px 12px; font-size: 12px; background-color: #334155; color: #f8fafc; border-radius: 4px; cursor: pointer; border: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>🧠 범용 AI 수열 분석기 (MLP 딥러닝)</h2>
    <p class="desc">다층 신경망(MLP)과 ReLU 활성화 함수가 적용되어 <b>등차수열, 등비수열, 2차/지수수열, 피보나치 패턴</b>까지 학습하여 예측할 수 있습니다.</p>

    <!-- 빠른 테스트용 예시 버튼 -->
    <div class="presets">
        <button class="preset-btn" onclick="setPreset('4, 7, 10, 13, 16')">등차 (3x+1)</button>
        <button class="preset-btn" onclick="setPreset('2, 4, 8, 16, 32')">등비 (2^x)</button>
        <button class="preset-btn" onclick="setPreset('1, 4, 9, 16, 25')">제곱 (x^2)</button>
        <button class="preset-btn" onclick="setPreset('1, 1, 2, 3, 5, 8, 13')">피보나치</button>
    </div>

    <div class="form-group">
        <label for="sequenceInput">수열 입력 (쉼표 구분):</label>
        <input type="text" id="sequenceInput" value="2, 4, 8, 16, 32" oninput="handleDataChange()">
    </div>

    <div class="form-group">
        <label for="epochInput">학습 횟수 (Epochs):</label>
        <input type="number" id="epochInput" value="1500" min="100" max="10000" oninput="handleDataChange()">
    </div>

    <div class="form-group">
        <label for="targetInput">예측할 항의 순서:</label>
        <input type="number" id="targetInput" placeholder="예: 6 (공백 시 다음 항)">
    </div>

    <div class="btn-group">
        <button id="trainBtn" onclick="trainModel()">🏋️ 1. 딥러닝 학습하기</button>
        <button id="predictBtn" onclick="predictNext()" disabled>🔮 2. 즉시 예측하기</button>
    </div>

    <div id="statusMessage" class="status">수열 데이터를 선택하거나 입력 후 학습을 시작하세요.</div>

    <div id="resultBox" class="result-box">
        <div class="result-title">📊 딥러닝 패턴 분석 리포트</div>
        <div class="result-item">
            <span class="result-label">학습된 수열</span>
            <span id="resPattern" class="result-value">-</span>
        </div>
        <div class="result-item">
            <span class="result-label">적용된 모델 구조</span>
            <span id="resModelType" class="result-value" style="color: var(--accent-color);">다층 신경망 (MLP + ReLU)</span>
        </div>
        <div class="result-item">
            <span class="result-label">AI 원시 연산값 (소수점)</span>
            <span id="resRaw" class="result-value">-</span>
        </div>
        <div class="result-item">
            <span class="result-label">🎯 최종 예측값 (보정된 정수)</span>
            <span id="resFinal" class="result-value highlight">-</span>
        </div>
    </div>
</div>

<script>
    let trainedModel = null; 
    let currentTrainedData = ""; 

    function setPreset(seq) {
        document.getElementById('sequenceInput').value = seq;
        handleDataChange();
    }

    function handleDataChange() {
        const inputStr = document.getElementById('sequenceInput').value;
        const epochs = document.getElementById('epochInput').value;
        const currentInput = `${inputStr}_${epochs}`;

        if (currentInput !== currentTrainedData) {
            document.getElementById('predictBtn').disabled = true;
            document.getElementById('statusMessage').innerText = "⚠️ 데이터가 변경되었습니다. [딥러닝 학습하기]를 눌러주세요.";
            document.getElementById('statusMessage').style.color = "#f43f5e";
        } else if (trainedModel) {
            document.getElementById('predictBtn').disabled = false;
            document.getElementById('statusMessage').innerText = "✅ 기존 딥러닝 모델이 준비되어 있습니다. 바로 예측 가능합니다.";
            document.getElementById('statusMessage').style.color = "#10b981";
        }
    }

    async function trainModel() {
        const trainBtn = document.getElementById('trainBtn');
        const predictBtn = document.getElementById('predictBtn');
        const statusMessage = document.getElementById('statusMessage');
        statusMessage.style.color = "var(--accent-color)";

        const inputStr = document.getElementById('sequenceInput').value;
        const yData = inputStr.split(',').map(n => parseFloat(n.trim())).filter(n => !isNaN(n));
        const epochs = parseInt(document.getElementById('epochInput').value) || 1500;
        
        if (yData.length < 3) {
            statusMessage.innerText = "⚠️ 복잡한 수열 학습을 위해 최소 3개 이상의 숫자를 입력해 주세요.";
            statusMessage.style.color = "#f43f5e";
            return;
        }

        const xData = Array.from({length: yData.length}, (_, i) => i + 1);

        if (trainedModel) {
            trainedModel.dispose();
        }

        trainBtn.disabled = true;
        predictBtn.disabled = true;
        statusMessage.innerText = `🏋️ 다층 신경망(MLP) 깊은 학습 중... (0 / ${epochs})`;

        // [핵심 업그레이드: 비선형 다층 신경망(MLP) 빌드]
        const model = tf.sequential();
        
        // 입력층 & 은닉층 1 (뉴런 16개 + 비선형 활성화함수 ReLU)
        model.add(tf.layers.dense({ units: 16, inputShape: [1], activation: 'relu' }));
        // 은닉층 2 (뉴런 8개 + ReLU) - 복잡한 비선형 곡선 및 계차 패턴 학습
        model.add(tf.layers.dense({ units: 8, activation: 'relu' }));
        // 출력층 (최종 숫자 1개 도출)
        model.add(tf.layers.dense({ units: 1 }));

        // Adam 최적화 도구 탑재 (다층 구조에 맞게 학습률 0.01 조정)
        model.compile({ optimizer: tf.train.adam(0.01), loss: 'meanSquaredError' });

        const xs = tf.tensor2d(xData, [xData.length, 1]);
        const ys = tf.tensor2d(yData, [yData.length, 1]);

        await model.fit(xs, ys, {
            epochs: epochs,
            callbacks: {
                onEpochEnd: (epoch) => {
                    if ((epoch + 1) % 150 === 0 || epoch + 1 === epochs) {
                        statusMessage.innerText = `🏋️ 딥러닝 레이어 가중치 최적화 중... (${epoch + 1} / ${epochs})`;
                    }
                }
            }
        });

        xs.dispose();
        ys.dispose();

        trainedModel = model;
        currentTrainedData = `${inputStr}_${epochs}`;

        statusMessage.innerText = "✅ 비선형 딥러닝 학습 완료! 즉시 예측이 가능합니다.";
        statusMessage.style.color = "#10b981";
        
        trainBtn.disabled = false;
        predictBtn.disabled = false;

        predictNext();
    }

    async function predictNext() {
        if (!trainedModel) return;

        const resultBox = document.getElementById('resultBox');
        const inputStr = document.getElementById('sequenceInput').value;
        const yData = inputStr.split(',').map(n => parseFloat(n.trim())).filter(n => !isNaN(n));

        let targetX = parseInt(document.getElementById('targetInput').value);
        if (isNaN(targetX)) {
            targetX = yData.length + 1;
        }

        const prediction = trainedModel.predict(tf.tensor2d([targetX], [1, 1]));
        const rawOutput = (await prediction.data())[0];
        const finalOutput = Math.round(rawOutput);

        document.getElementById('resPattern').innerText = `${yData.join(' → ')}`;
        document.getElementById('resRaw').innerText = rawOutput.toFixed(6);
        document.getElementById('resFinal').innerText = `[${targetX}번째 항] = ${finalOutput}`;

        resultBox.style.display = "block";
        prediction.dispose();
    }
</script>

</body>
</html>
